<div class="group relative overflow-hidden rounded-lg transition-transform duration-300 hover:scale-105">
  <a href="{{ project.url | relative_url }}" class="block">
    <img 
      src="{{ project.image | relative_url }}" 
      alt="{{ project.title }}" 
      class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-110"
    />
    <div class="absolute inset-0 bg-black bg-opacity-20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
    <div class="absolute bottom-0 left-0 p-4 text-white">
      <span class="text-xs uppercase tracking-wider mb-1 block">{{ project.category }}</span>
      <h3 class="text-xl font-bold">{{ project.title }}</h3>
      <p class="text-sm mt-2">{{ project.date | date: "%d/%m/%Y" }}</p>
    </div>
  </a>
</div>
